<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orb Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  background:#0f1115;
  color:#fff;
  font-family:'Poppins',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas {
  background:#111;
  width:100%;
  max-width:500px;
  border-radius:12px;
  margin-top:10px;
}

.ui {
  width:100%;
  max-width:500px;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#4cafef;
  color:#fff;
  cursor:pointer;
}

#msg {
  margin-top:8px;
  font-size:12px;
  opacity:0.7;
}

.bar {
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill {
  height:100%;
  background:#4cafef;
  width:0%;
}
</style>
</head>
<body>

<div class="ui">
  <div>Score: <span id="score">0</span></div>
  <div>Level: <span id="level">1</span></div>
</div>

<div class="bar"><div id="progress" class="fill"></div></div>

<canvas id="game"></canvas>

<div class="ui">
  <button onclick="startGame()">START</button>
  <button onclick="restartGame()">RESTART</button>
</div>

<div id="msg">Tap / Arrow untuk gerak</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

let player, obstacles, score, level, speed, running;

// init game
function init(){
  player = {x:180,y:500,size:20};
  obstacles = [];
  score = 0;
  level = 1;
  speed = 2;
  running = false;
}

// spawn obstacle
function spawn(){
  obstacles.push({
    x: Math.random()*360,
    y: -20,
    size:20
  });
}

// game loop
function loop(){
  if(!running) return;

  ctx.clearRect(0,0,400,600);

  // player
  ctx.fillStyle="#4cafef";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
  ctx.fill();

  // obstacles
  ctx.fillStyle="#ff4d4d";
  obstacles.forEach(o=>{
    o.y += speed;
    ctx.fillRect(o.x,o.y,o.size,o.size);

    // collision
    if(
      player.x < o.x + o.size &&
      player.x + player.size > o.x &&
      player.y < o.y + o.size &&
      player.y + player.size > o.y
    ){ 
      running = false;
      document.getElementById("msg").innerText="Game Over 😵";
    }
  });

  // remove offscreen
  obstacles = obstacles.filter(o=>o.y < 600);

  // spawn random
  if(Math.random() < 0.02) spawn();

  // score & level
  score++;
  if(score % 200 === 0){
    level++;
    speed += 0.5;
  }

  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;
  document.getElementById("progress").style.width = (score % 200)/2 + "%";

  requestAnimationFrame(loop);
}

// controls
document.addEventListener("keydown", e=>{
  if(e.key === "ArrowLeft") player.x -= 20;
  if(e.key === "ArrowRight") player.x += 20;
});

canvas.addEventListener("touchstart", e=>{
  let x = e.touches[0].clientX;
  if(x < window.innerWidth/2) player.x -= 30;
  else player.x += 30;
});

// start
function startGame(){
  running = true;
  document.getElementById("msg").innerText="Survive...";
  loop();
}

// restart
function restartGame(){
  init();
  document.getElementById("msg").innerText="Restarted!";
}

// init awal
init();
</script>

</body>
</html>
